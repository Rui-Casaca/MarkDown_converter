name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project with build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build standalone executable
        run: python -m PyInstaller --noconfirm --clean doc2md.spec

      - name: Upload executable as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: doc2md-windows
          path: dist/doc2md.exe

      - name: Attach executable to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/doc2md.exe
